syntax = "proto3";

// Имя пакета
package grpc.v1;

// Опция расположения генерашки
option go_package = "docs/proto/v1";

service Downloader {
    rpc RegisterDownloader (RegisterDownloaderRequest) returns (RegisterDownloaderResponse) {}
}

message RegisterDownloaderRequest{
    string serverName = 1;
    repeated string allowedRootLinks = 2;
    string serverHost = 3;
    int32 serverPort = 4;
}

message RegisterDownloaderResponse{
    optional string status = 1;
}